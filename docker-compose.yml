version: '3.9'

services:
  # =====================================================
  # PostgreSQL Database
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: honeypot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: honeypot_db
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - honeypot-network
    restart: unless-stopped

  # =====================================================
  # Redis Cache
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: honeypot-cache
    command: redis-server --appendonly yes --requirepass password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - honeypot-network
    restart: unless-stopped

  # =====================================================
  # FastAPI Backend
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-api
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/honeypot_db
      - REDIS_URL=redis://:password@redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-this-in-production-12345
      - DEBUG=True
      - BACKEND_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: |
      sh -c "alembic upgrade head && 
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - honeypot-network
    restart: unless-stopped

  # =====================================================
  # React Frontend
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: honeypot-ui
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - honeypot-network
    restart: unless-stopped

  # =====================================================
  # Cowrie SSH/Telnet Honeypot
  # =====================================================
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeypot-cowrie
    environment:
      - COWRIE_HOSTNAME=honeypot-server
    volumes:
      - cowrie_data:/home/cowrie/cowrie/var
      - ./honeypots/cowrie/cowrie.conf:/home/cowrie/cowrie/etc/cowrie.conf
    ports:
      - "2222:22"
      - "2323:23"
    networks:
      - honeypot-network
    restart: unless-stopped

  # =====================================================
  # Dionaea Malware Honeypot
  # =====================================================
  dionaea:
    image: malice/dionaea:latest
    container_name: honeypot-dionaea
    volumes:
      - dionaea_data:/opt/dionaea/var
      - ./honeypots/dionaea/dionaea.conf:/etc/dionaea/dionaea.conf
    ports:
      - "8081:8081"
      - "445:445"
      - "139:139"
      - "21:21"
      - "25:25"
      - "69:69/udp"
    networks:
      - honeypot-network
    restart: unless-stopped

  # =====================================================
  # Nginx Reverse Proxy
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: honeypot-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - honeypot-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  cowrie_data:
  dionaea_data:

networks:
  honeypot-network:
    driver: bridge
